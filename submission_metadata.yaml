# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  We built a Staged Hybrid Ranking Engine (SHRE) with a pure-Python Career Trajectory-Aware Engine (CTAE) fallback,
  enhanced with four targeted upgrades for deeper JD understanding and richer signal integration:
    (1) Multi-Vector Semantic Layer - separately embeds candidate skills, experience trajectory, and full profile
        with an open-source transformer (all-MiniLM-L6-v2, FAISS retrieval), matched against three JD facets and
        combined via weighted fusion. Degrades gracefully to a TF-IDF encoder if transformers/FAISS are unavailable.
    (2) LambdaMART / XGBoost-LTR ranking head - an XGBRanker (rank:ndcg) stacked on the ensemble's class-prob
        meta-feature, fused with the ensemble ordering to optimize the full ranked list.
    (3) Enhanced Honeypot / Anomaly Detection - a multi-signal pre-filter catching timeline overlaps, impossible
        skill durations, and synthetic-profile flags; its score also feeds the model.
    (4) Behavioral Scoring Module - distills under-utilized platform activity/demand/OSS/reliability signals into
        interpretable sub-scores.
  Pipeline: Stage 1 anomaly pre-filter + experience/pillar gates -> Stage 2 feature engineering (78 base + anomaly +
  behavioral + semantic = 93 signals) -> Stage 3 Voting Ensemble (XGBoost + LightGBM + CatBoost, leakage-safe SMOTE
  inside CV) feeding the LambdaMART LTR head -> Stage 4 ranked top-100 with data-grounded, non-hallucinated reasoning.
  Ablation (5-fold) shows the added features lift macro-F1 from 0.731 (78 base) to 0.794 (93 enriched). The system is
  fully open-source and zero extra cost; if any library or model load fails it automatically falls back to the
  pure-Python CTAE ranker.

